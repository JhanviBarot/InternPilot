# Render.com deployment manifest.
# See deploy guide in README.md.
# Dashboard: https://dashboard.render.com

services:
  - type: web
    name: internpilot-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # --- Required ---
      - key: DATABASE_URL
        sync: false        # set in Render dashboard: postgresql+asyncpg://...?ssl=require
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false        # set to your Cloudflare Pages / Vercel URL

      # --- LLM (at least one required) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      # --- Optional enrichment ---
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_EMAIL
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
