services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass}
      POSTGRES_DB: internpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the docker service, not localhost
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-testpass}@db:5432/internpilot
      PORT: "8000"
      WEB_CONCURRENCY: "1"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
